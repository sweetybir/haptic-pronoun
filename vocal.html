<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>聲痕 · Vocal Pronoun</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f3eee2;
        font-family:
          "Songti SC", "STSong", "PingFang SC", "Times New Roman", serif;
        color: #1a1a1a;
        user-select: none;
        -webkit-user-select: none;
        position: fixed;
      }
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f3eee2;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f3eee2;
        padding: 40px 24px;
        z-index: 100;
      }
      .title {
        font-size: 32px;
        letter-spacing: 12px;
        margin-bottom: 8px;
        font-weight: normal;
        margin-left: 12px; /* counter the letter-spacing visual offset */
      }
      .subtitle {
        font-size: 11px;
        letter-spacing: 4px;
        color: #999;
        margin-bottom: 28px;
      }
      .tagline {
        font-size: 12px;
        letter-spacing: 1.5px;
        color: #555;
        margin-bottom: 56px;
        max-width: 280px;
        text-align: center;
        line-height: 2;
      }
      .btn {
        padding: 14px 28px;
        background: transparent;
        border: 1px solid #1a1a1a;
        color: #1a1a1a;
        font-family: inherit;
        font-size: 13px;
        letter-spacing: 4px;
        cursor: pointer;
        margin: 4px;
        min-width: 160px;
        transition: all 0.15s;
      }
      .btn:active {
        background: #1a1a1a;
        color: #f3eee2;
      }
      .btn-mini {
        padding: 10px 20px;
        font-size: 11px;
        letter-spacing: 3px;
        min-width: 0;
      }
      .room-input {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
      }
      .digit {
        width: 44px;
        height: 56px;
        border: 1px solid #1a1a1a;
        background: transparent;
        text-align: center;
        font-size: 22px;
        font-family: inherit;
        color: #1a1a1a;
        outline: none;
        text-transform: uppercase;
      }
      .room-code {
        font-size: 38px;
        letter-spacing: 16px;
        margin: 16px 0 24px 8px;
        font-weight: normal;
      }
      .status {
        font-size: 11px;
        letter-spacing: 3px;
        color: #888;
        margin-top: 16px;
        min-height: 16px;
        text-align: center;
      }
      .label {
        font-size: 11px;
        letter-spacing: 3px;
        color: #888;
      }
      .hidden {
        display: none !important;
      }
      .session-ui {
        position: fixed;
        z-index: 10;
        pointer-events: none;
        font-size: 10px;
        letter-spacing: 4px;
        opacity: 0.5;
        color: #1a1a1a;
      }
      .state-label {
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
      }
      .marker-self {
        top: calc(50% - 64px);
        left: 16px;
      }
      .marker-other {
        top: calc(50% + 56px);
        left: 16px;
      }
      .now-label {
        top: 50%;
        right: 8px;
        transform: translateY(-50%) rotate(90deg);
        transform-origin: center;
        font-size: 8px;
        opacity: 0.3;
        letter-spacing: 3px;
      }
      .exit {
        position: fixed;
        bottom: max(24px, env(safe-area-inset-bottom, 24px));
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        letter-spacing: 4px;
        color: #1a1a1a;
        opacity: 0.4;
        background: transparent;
        border: none;
        font-family: inherit;
        cursor: pointer;
        z-index: 10;
        padding: 10px 18px;
        pointer-events: auto;
      }
      .exit:active {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="overlay" id="pairing">
      <div class="title">聲痕</div>
      <div class="subtitle">VOCAL · TRACE</div>
      <div class="tagline">沉默 是讓對方顯影 的條件</div>

      <div id="screen-init">
        <button class="btn" id="create-btn">創建房間</button>
        <button class="btn" id="join-btn">加入房間</button>
      </div>

      <div id="screen-host" class="hidden">
        <div class="label">房間號</div>
        <div class="room-code" id="room-display">----</div>
        <div class="status" id="host-status">等待加入...</div>
        <button class="btn btn-mini" id="host-back" style="margin-top: 32px">
          返回
        </button>
      </div>

      <div id="screen-join" class="hidden">
        <div class="label">輸入房間號</div>
        <div style="height: 18px"></div>
        <div class="room-input" id="room-input">
          <input
            class="digit"
            maxlength="1"
            type="text"
            autocomplete="off"
            autocapitalize="characters"
          />
          <input
            class="digit"
            maxlength="1"
            type="text"
            autocomplete="off"
            autocapitalize="characters"
          />
          <input
            class="digit"
            maxlength="1"
            type="text"
            autocomplete="off"
            autocapitalize="characters"
          />
          <input
            class="digit"
            maxlength="1"
            type="text"
            autocomplete="off"
            autocapitalize="characters"
          />
        </div>
        <button class="btn btn-mini" id="connect-btn">連接</button>
        <div class="status" id="join-status"></div>
        <button class="btn btn-mini" id="join-back" style="margin-top: 24px">
          返回
        </button>
      </div>
    </div>

    <div class="session-ui state-label hidden" id="state-label">獨</div>
    <div class="session-ui marker-self hidden" id="marker-self">我 ↑</div>
    <div class="session-ui marker-other hidden" id="marker-other">彼 ↓</div>
    <div class="session-ui now-label hidden" id="now-label">現在 →</div>
    <button class="exit hidden" id="exit-btn">離 · LEAVE</button>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
      "use strict";

      // ======================== CONFIG ========================
      const TIMELINE_SEC = 8; // visible window of history
      const SAMPLE_HZ = 30; // history sample rate
      const SEND_HZ = 25; // network send rate

      const VAD_ON = 0.02; // RMS to trigger speaking
      const VAD_OFF = 0.012; // hysteresis lower bound
      const VAD_END_MS = 700; // ms of silence to end a turn
      const VAD_START_F = 2; // frames above ON to start

      const AMPLITUDE = 95; // max px deflection
      const PITCH_LO_HZ = 80;
      const PITCH_HI_HZ = 500;

      const ICE_SERVERS = [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "stun:stun.cloudflare.com:3478" },
      ];

      // ======================== STATE ========================
      let peer = null,
        conn = null;
      let isHost = false;
      let roomCode = "";

      let audioCtx, analyser, micStream;
      let timeBuf, freqBuf;

      const local = {
        active: false,
        vol: 0,
        pitch: 0.5,
        tremor: 0,
        _on: 0,
        _silSince: 0,
      };
      const remote = { active: false, vol: 0, pitch: 0.5, tremor: 0, _seen: 0 };

      let frames = []; // history: { t, lA,lV,lP,lTr, rA,rV,rP,rTr }
      let lastSampleT = 0;
      let lastSendT = 0;

      const volHist = [];

      // ======================== CANVAS ========================
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      let W = 0,
        H = 0,
        DPR = 1;

      function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = Math.floor(W * DPR);
        canvas.height = Math.floor(H * DPR);
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        makeGrain();
      }
      window.addEventListener("resize", resize);
      window.addEventListener("orientationchange", () =>
        setTimeout(resize, 200),
      );

      // ======================== PAIRING ========================
      function genCode() {
        const chars = "ACDEFGHJKLMNPQRSTUVWXYZ23456789";
        let s = "";
        for (let i = 0; i < 4; i++)
          s += chars[Math.floor(Math.random() * chars.length)];
        return s;
      }

      function showScreen(id) {
        ["screen-init", "screen-host", "screen-join"].forEach((s) => {
          document.getElementById(s).classList.toggle("hidden", s !== id);
        });
      }

      document.getElementById("create-btn").addEventListener("click", () => {
        isHost = true;
        roomCode = genCode();
        showScreen("screen-host");
        document.getElementById("room-display").textContent = roomCode;
        document.getElementById("host-status").textContent = "初始化...";

        peer = new Peer("vp-" + roomCode, {
          config: { iceServers: ICE_SERVERS },
        });
        peer.on("open", () => {
          document.getElementById("host-status").textContent = "等待加入...";
        });
        peer.on("connection", (c) => {
          conn = c;
          bindConn();
        });
        peer.on("error", (e) => {
          document.getElementById("host-status").textContent =
            "錯誤 · " + (e.type || "unknown");
        });
      });

      document.getElementById("join-btn").addEventListener("click", () => {
        isHost = false;
        showScreen("screen-join");
        setTimeout(() => document.querySelector(".digit").focus(), 100);
      });

      document.getElementById("host-back").addEventListener("click", () => {
        if (peer) {
          try {
            peer.destroy();
          } catch (e) {}
          peer = null;
        }
        showScreen("screen-init");
      });
      document.getElementById("join-back").addEventListener("click", () => {
        if (peer) {
          try {
            peer.destroy();
          } catch (e) {}
          peer = null;
        }
        document.querySelectorAll(".digit").forEach((d) => (d.value = ""));
        document.getElementById("join-status").textContent = "";
        showScreen("screen-init");
      });

      const digits = document.querySelectorAll(".digit");
      digits.forEach((d, i) => {
        d.addEventListener("input", (e) => {
          e.target.value = e.target.value
            .toUpperCase()
            .replace(/[^A-Z0-9]/g, "");
          if (e.target.value && i < digits.length - 1) digits[i + 1].focus();
        });
        d.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !e.target.value && i > 0)
            digits[i - 1].focus();
        });
      });

      document.getElementById("connect-btn").addEventListener("click", () => {
        let code = "";
        digits.forEach((d) => (code += d.value));
        if (code.length !== 4) {
          document.getElementById("join-status").textContent = "請輸入 4 位";
          return;
        }
        roomCode = code;
        document.getElementById("join-status").textContent = "連接中...";

        peer = new Peer(undefined, { config: { iceServers: ICE_SERVERS } });
        peer.on("open", () => {
          conn = peer.connect("vp-" + roomCode, { reliable: false });
          conn.on("open", () => bindConn());
          conn.on("error", () => {
            document.getElementById("join-status").textContent = "連接失敗";
          });
          setTimeout(() => {
            if (!conn || !conn.open) {
              document.getElementById("join-status").textContent = "找不到房間";
            }
          }, 8000);
        });
        peer.on("error", (e) => {
          document.getElementById("join-status").textContent =
            "錯誤 · " + (e.type || "unknown");
        });
      });

      function bindConn() {
        if (!conn) return;
        conn.on("data", (msg) => {
          if (msg && msg.t === "f") {
            remote.active = !!msg.a;
            remote.vol = msg.v || 0;
            remote.pitch = msg.p || 0.5;
            remote.tremor = msg.r || 0;
            remote._seen = performance.now();
          }
        });
        conn.on("close", () => {
          const el = document.getElementById("state-label");
          if (el && !el.classList.contains("hidden")) {
            el.textContent = "已 · 斷";
          }
        });
        if (conn.open) {
          startSession();
        } else {
          conn.on("open", startSession);
        }
      }

      // ======================== AUDIO ========================
      async function initMic() {
        try {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: false,
            },
          });
        } catch (err) {
          alert("需要麥克風權限\nMicrophone access required");
          throw err;
        }
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") await audioCtx.resume();

        const src = audioCtx.createMediaStreamSource(micStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.5;
        src.connect(analyser);

        timeBuf = new Float32Array(analyser.fftSize);
        freqBuf = new Uint8Array(analyser.frequencyBinCount);
      }

      function processAudio() {
        if (!analyser) return;

        analyser.getFloatTimeDomainData(timeBuf);
        analyser.getByteFrequencyData(freqBuf);

        // Volume (RMS) ----------------------------------------
        let sumSq = 0;
        for (let i = 0; i < timeBuf.length; i++)
          sumSq += timeBuf[i] * timeBuf[i];
        const rms = Math.sqrt(sumSq / timeBuf.length);
        // Soft normalization curve
        local.vol = Math.min(Math.pow(rms * 4.5, 0.85), 1);

        // Dominant pitch (FFT peak in vocal range) ------------
        const binHz = audioCtx.sampleRate / analyser.fftSize;
        const lowBin = Math.max(1, Math.floor(PITCH_LO_HZ / binHz));
        const highBin = Math.min(
          freqBuf.length - 1,
          Math.floor(PITCH_HI_HZ / binHz),
        );
        let maxBin = lowBin,
          maxVal = 0;
        for (let i = lowBin; i < highBin; i++) {
          if (freqBuf[i] > maxVal) {
            maxVal = freqBuf[i];
            maxBin = i;
          }
        }
        if (maxVal > 60 && rms > 0.005) {
          const hz = maxBin * binHz;
          const t =
            (Math.log2(hz) - Math.log2(PITCH_LO_HZ)) /
            (Math.log2(PITCH_HI_HZ) - Math.log2(PITCH_LO_HZ));
          // Smooth pitch toward new value
          local.pitch = local.pitch * 0.6 + Math.max(0, Math.min(1, t)) * 0.4;
        }

        // Tremor: rolling variance of volume ------------------
        volHist.push(local.vol);
        if (volHist.length > 14) volHist.shift();
        let m = 0;
        for (const x of volHist) m += x;
        m /= volHist.length;
        let v = 0;
        for (const x of volHist) v += (x - m) * (x - m);
        v /= volHist.length;
        local.tremor = Math.min(Math.sqrt(v) * 12, 1);

        // VAD with hysteresis ---------------------------------
        const now = performance.now();
        if (!local.active) {
          if (rms > VAD_ON) {
            local._on++;
            if (local._on >= VAD_START_F) {
              local.active = true;
              local._silSince = 0;
            }
          } else {
            local._on = 0;
          }
        } else {
          if (rms < VAD_OFF) {
            if (local._silSince === 0) local._silSince = now;
            else if (now - local._silSince > VAD_END_MS) {
              local.active = false;
              local._silSince = 0;
              local._on = 0;
            }
          } else {
            local._silSince = 0;
          }
        }

        // Send (throttled) ------------------------------------
        if (conn && conn.open && now - lastSendT > 1000 / SEND_HZ) {
          lastSendT = now;
          try {
            conn.send({
              t: "f",
              a: local.active,
              v: +local.vol.toFixed(3),
              p: +local.pitch.toFixed(3),
              r: +local.tremor.toFixed(3),
            });
          } catch (e) {}
        }
      }

      // ======================== SAMPLING ========================
      function sampleFrame() {
        const now = performance.now();
        if (now - lastSampleT < 1000 / SAMPLE_HZ) return;
        lastSampleT = now;

        // Stale remote: treat as inactive if no frames recently
        if (now - remote._seen > 1500) {
          remote.active = false;
          remote.vol = 0;
        }

        frames.push({
          t: now,
          lA: local.active,
          lV: local.vol,
          lP: local.pitch,
          lTr: local.tremor,
          rA: remote.active,
          rV: remote.vol,
          rP: remote.pitch,
          rTr: remote.tremor,
        });
        const cutoff = now - TIMELINE_SEC * 1000;
        while (frames.length && frames[0].t < cutoff) frames.shift();
      }

      // ======================== PAPER GRAIN ========================
      let grainCanvas = null;
      function makeGrain() {
        grainCanvas = document.createElement("canvas");
        grainCanvas.width = 240;
        grainCanvas.height = 240;
        const g = grainCanvas.getContext("2d");
        const id = g.createImageData(240, 240);
        for (let i = 0; i < id.data.length; i += 4) {
          const r = Math.random();
          if (r < 0.06) {
            id.data[i] =
              id.data[i + 1] =
              id.data[i + 2] =
                30 + Math.random() * 60;
            id.data[i + 3] = 30 + Math.random() * 50;
          } else if (r < 0.14) {
            id.data[i] = 200 + Math.random() * 40;
            id.data[i + 1] = 195 + Math.random() * 30;
            id.data[i + 2] = 175 + Math.random() * 25;
            id.data[i + 3] = 60;
          } else {
            id.data[i + 3] = 0;
          }
        }
        g.putImageData(id, 0, 0);
      }
      makeGrain();
      resize();

      function paperBackground() {
        ctx.fillStyle = "#f3eee2";
        ctx.fillRect(0, 0, W, H);

        ctx.globalAlpha = 0.5;
        for (let y = 0; y < H; y += 240) {
          for (let x = 0; x < W; x += 240) {
            ctx.drawImage(grainCanvas, x, y);
          }
        }
        ctx.globalAlpha = 1;

        // Subtle vignette
        const grad = ctx.createRadialGradient(
          W / 2,
          H / 2,
          Math.min(W, H) * 0.35,
          W / 2,
          H / 2,
          Math.max(W, H) * 0.75,
        );
        grad.addColorStop(0, "rgba(0,0,0,0)");
        grad.addColorStop(1, "rgba(60,40,20,0.07)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      }

      // ======================== RENDERING ========================
      function timeToX(t, now) {
        // older = left (smaller x); now = right edge (W)
        return ((t - now) / (TIMELINE_SEC * 1000) + 1) * W;
      }

      function render() {
        paperBackground();

        const now = performance.now();
        const yMid = H / 2;

        // Faint baseline
        ctx.strokeStyle = "rgba(26,26,26,0.10)";
        ctx.lineWidth = 0.5;
        ctx.setLineDash([3, 7]);
        ctx.beginPath();
        ctx.moveTo(0, yMid);
        ctx.lineTo(W, yMid);
        ctx.stroke();
        ctx.setLineDash([]);

        // 'Now' edge
        ctx.strokeStyle = "rgba(26,26,26,0.18)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(W - 0.5, 0);
        ctx.lineTo(W - 0.5, H);
        ctx.stroke();

        if (frames.length < 2) return;

        // Two passes: halos under, cores over
        for (let pass = 0; pass < 2; pass++) {
          for (let i = 1; i < frames.length; i++) {
            const f0 = frames[i - 1];
            const f1 = frames[i];
            const x0 = timeToX(f0.t, now);
            const x1 = timeToX(f1.t, now);

            // Age-based fade (recent = full opacity, old = faded)
            const age = (now - f1.t) / (TIMELINE_SEC * 1000);
            const alpha = Math.pow(1 - age, 1.5);

            if (f1.lA && f1.rA) {
              // Both speaking — illegible black blob (transient: only at this moment in time)
              if (pass === 1) drawOverlap(x0, x1, yMid, f1, alpha);
            } else if (f1.lA) {
              drawTraceSeg(
                x0,
                x1,
                yMid,
                f0.lA ? f0.lV : 0,
                f1.lV,
                f1.lP,
                f1.lTr,
                alpha,
                -1,
                pass,
              );
            } else if (f1.rA) {
              drawTraceSeg(
                x0,
                x1,
                yMid,
                f0.rA ? f0.rV : 0,
                f1.rV,
                f1.rP,
                f1.rTr,
                alpha,
                +1,
                pass,
              );
            }
            // else: silence — leave the baseline visible
          }
        }
      }

      function drawTraceSeg(
        x0,
        x1,
        yMid,
        vPrev,
        vCurr,
        pitch,
        tremor,
        alpha,
        dir,
        pass,
      ) {
        const ampPrev = vPrev * AMPLITUDE * dir;
        const ampCurr = vCurr * AMPLITUDE * dir;

        // Pitch wobble: faster oscillation for higher pitch
        const wobbleFreq = 5 + pitch * 22;
        const wobbleAmp = vCurr * 7 * (0.3 + pitch * 0.7);
        const wobble = Math.sin(x1 * 0.07 * wobbleFreq) * wobbleAmp * dir;

        // Tremor noise
        const noiseAmp = tremor * 7;
        const noise = (Math.random() - 0.5) * noiseAmp * dir;

        const y0 = yMid + ampPrev;
        const y1 = yMid + ampCurr + wobble + noise;

        if (pass === 0) {
          // Halo (soft outer ink bleed)
          ctx.strokeStyle = `rgba(20,15,12,${alpha * 0.16})`;
          ctx.lineWidth = 5 + vCurr * 11;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x1, y1);
          ctx.stroke();

          ctx.strokeStyle = `rgba(20,15,12,${alpha * 0.08})`;
          ctx.lineWidth = 10 + vCurr * 18;
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x1, y1);
          ctx.stroke();
        } else {
          // Core
          ctx.strokeStyle = `rgba(15,10,8,${alpha * (0.55 + vCurr * 0.45)})`;
          ctx.lineWidth = 1 + vCurr * 3.5;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x1, y1);
          ctx.stroke();
        }
      }

      function drawOverlap(x0, x1, yMid, f, alpha) {
        // Both speaking: muddy black blob covering both directions
        const w = Math.max(x1 - x0, 1);

          0,

          yMid + (dnH - upH) / 2,
          w * 1.2 + 4,
          (upH + dnH) * 0.6 + 6,
          0,
          0,
          Math.PI * 2,

        ctx.fill();

        ctx.fillStyle = `rgba(8,6,5,${alpha * 0.88})`;
        ctx.beginPath();

        });
        peer.on("disconnected", () => {
          setHint(hostStatusEl, "信 号 中 断 · 重 连 中", "error");
          try {
            peer.reconnect();
          } catch (e) {}
        });
      }

      function startJoin(code) {
        isHost = false;
        btnConnect.disabled = true;
        setHint(joinStatusEl, "连 接 中", null);
        peer = new Peer(null, PEER_CONFIG);
        const targetId = ROOM_PREFIX + code;
        peer.on("open", () => {
          setTimeout(() => {
            conn = peer.connect(targetId, {
              reliable: true,
              serialization: "json",
            });
            if (!conn) {
              setHint(joinStatusEl, "无 法 发 起 · 重 试", "error");
              btnConnect.disabled = false;
              return;
            }
            setupConn();
            startIceMonitor(joinStatusEl);
            joinTimeout = setTimeout(() => {
              if (!isConnected) {
                setHint(joinStatusEl, "通 道 未 通 · 网 络 受 限", "error");
                btnConnect.disabled = false;
                try {
                  conn.close();
                } catch (e) {}
                try {
                  peer.destroy();
                } catch (e) {}
                conn = null;
                peer = null;
              }
            }, 20000);
          }, 400);
        });
        peer.on("error", (err) => {
          if (joinTimeout) {
            clearTimeout(joinTimeout);
            joinTimeout = null;
          }
          btnConnect.disabled = false;
          if (err.type === "peer-unavailable") {
            setHint(joinStatusEl, "代 号 不 存 在 · 重 试", "error");
          } else if (
            err.type === "network" ||
            err.type === "server-error" ||
            err.type === "socket-error"
          ) {
            setHint(joinStatusEl, "服 务 不 通 · 刷 新 重 试", "error");
          } else {
            setHint(joinStatusEl, "出 错 · " + err.type, "error");
          }
        });
      }

      function setupConn() {
        conn.on("open", () => {
          isConnected = true;
          connDot.classList.add("connected");
          exitBtn.classList.add("visible");
          if (joinTimeout) {
            clearTimeout(joinTimeout);
            joinTimeout = null;
          }
          if (hostTimeout) {
            clearTimeout(hostTimeout);
            hostTimeout = null;
          }
          if (iceMonitorInterval) {
            clearInterval(iceMonitorInterval);
            iceMonitorInterval = null;
          }
          if (isHost) setHint(hostStatusEl, "已 接 入", "success");
          else setHint(joinStatusEl, "已 连 接", "success");
          setTimeout(startSession, 700);
        });
        conn.on("data", (msg) => {
          if (msg && msg.type === "bye") {
            showPairingAgain();
            return;
          }
          if (msg && msg.t === "f") {
            remote.active = !!msg.a;
            remote.vol = msg.v || 0;
            remote.pitch = msg.p || 0.5;
            remote.tremor = msg.r || 0;
            remote._seen = performance.now();
          }
        });
        conn.on("close", () => {
          if (isConnected) showPairingAgain();
          else {
            isConnected = false;
            connDot.classList.remove("connected");
            exitBtn.classList.remove("visible");
          }
        });
        conn.on("error", (err) => console.error("conn err", err));
      }

      // ═══════════════════════════════════════════════════════════
      //  AUDIO
      // ═══════════════════════════════════════════════════════════
      async function initMic() {
        try {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: false,
            },
          });
        } catch (err) {
          alert("需要麦克风权限\nMicrophone access required");
          throw err;
        }
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") await audioCtx.resume();

        const src = audioCtx.createMediaStreamSource(micStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.5;
        src.connect(analyser);

        timeBuf = new Float32Array(analyser.fftSize);
        freqBuf = new Uint8Array(analyser.frequencyBinCount);
      }

      function processAudio() {
        if (!analyser) return;

        analyser.getFloatTimeDomainData(timeBuf);
        analyser.getByteFrequencyData(freqBuf);

        // Volume (RMS)
        let sumSq = 0;
        for (let i = 0; i < timeBuf.length; i++)
          sumSq += timeBuf[i] * timeBuf[i];
        const rms = Math.sqrt(sumSq / timeBuf.length);
        local.vol = Math.min(Math.pow(rms * 4.5, 0.85), 1);

        // Dominant pitch (FFT peak in vocal range)
        const binHz = audioCtx.sampleRate / analyser.fftSize;
        const lowBin = Math.max(1, Math.floor(PITCH_LO_HZ / binHz));
        const highBin = Math.min(
          freqBuf.length - 1,
          Math.floor(PITCH_HI_HZ / binHz),
        );
        let maxBin = lowBin,
          maxVal = 0;
        for (let i = lowBin; i < highBin; i++) {
          if (freqBuf[i] > maxVal) {
            maxVal = freqBuf[i];
            maxBin = i;
          }
        }
        if (maxVal > 60 && rms > 0.005) {
          const hz = maxBin * binHz;
          const t =
            (Math.log2(hz) - Math.log2(PITCH_LO_HZ)) /
            (Math.log2(PITCH_HI_HZ) - Math.log2(PITCH_LO_HZ));
          local.pitch = local.pitch * 0.6 + Math.max(0, Math.min(1, t)) * 0.4;
        }

        // Tremor: rolling variance of volume
        volHist.push(local.vol);
        if (volHist.length > 14) volHist.shift();
        let m = 0;
        for (const x of volHist) m += x;
        m /= volHist.length;
        let v = 0;
        for (const x of volHist) v += (x - m) * (x - m);
        v /= volHist.length;
        local.tremor = Math.min(Math.sqrt(v) * 12, 1);

        // VAD with hysteresis
        const now = performance.now();
        if (!local.active) {
          if (rms > VAD_ON) {
            local._on++;
            if (local._on >= VAD_START_F) {
              local.active = true;
              local._silSince = 0;
            }
          } else local._on = 0;
        } else {
          if (rms < VAD_OFF) {
            if (local._silSince === 0) local._silSince = now;
            else if (now - local._silSince > VAD_END_MS) {
              local.active = false;
              local._silSince = 0;
              local._on = 0;
            }
          } else local._silSince = 0;
        }

        // Send (throttled)
        if (conn && conn.open && now - lastSendT > 1000 / SEND_HZ) {
          lastSendT = now;
          try {
            conn.send({
              t: "f",
              a: local.active,
              v: +local.vol.toFixed(3),
              p: +local.pitch.toFixed(3),
              r: +local.tremor.toFixed(3),
            });
          } catch (e) {}
        }
      }

      // ═══════════════════════════════════════════════════════════
      //  SAMPLING
      // ═══════════════════════════════════════════════════════════
      function sampleFrame() {
        const now = performance.now();
        if (now - lastSampleT < 1000 / SAMPLE_HZ) return;
        lastSampleT = now;

        if (now - remote._seen > 1500) {
          remote.active = false;
          remote.vol = 0;
        }

        frames.push({
          t: now,
          lA: local.active,
          lV: local.vol,
          lP: local.pitch,
          lTr: local.tremor,
          rA: remote.active,
          rV: remote.vol,
          rP: remote.pitch,
          rTr: remote.tremor,
        });
        const cutoff = now - TIMELINE_SEC * 1000;
        while (frames.length && frames[0].t < cutoff) frames.shift();
      }

      // ═══════════════════════════════════════════════════════════
      //  RENDERING
      // ═══════════════════════════════════════════════════════════
      function paperBackground() {
        ctx.fillStyle = "#f2efe9";
        ctx.fillRect(0, 0, W, H);
        // Note: paper grain comes from the .paper-grain DOM overlay (matches haptic)
      }

      function timeToX(t, now) {
        return ((t - now) / (TIMELINE_SEC * 1000) + 1) * W;
      }

      function render() {
        paperBackground();

        const now = performance.now();
        const yMid = H / 2;

        // Faint baseline
        ctx.strokeStyle = "rgba(26,26,26,0.10)";
        ctx.lineWidth = 0.5;
        ctx.setLineDash([3, 7]);
        ctx.beginPath();
        ctx.moveTo(0, yMid);
        ctx.lineTo(W, yMid);
        ctx.stroke();
        ctx.setLineDash([]);

        // 'Now' edge marker
        ctx.strokeStyle = "rgba(26,26,26,0.18)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(W - 0.5, 0);
        ctx.lineTo(W - 0.5, H);
        ctx.stroke();

        if (frames.length < 2) return;

        // Two passes: halos, then cores
        for (let pass = 0; pass < 2; pass++) {
          for (let i = 1; i < frames.length; i++) {
            const f0 = frames[i - 1];
            const f1 = frames[i];
            const x0 = timeToX(f0.t, now);
            const x1 = timeToX(f1.t, now);

            const age = (now - f1.t) / (TIMELINE_SEC * 1000);
            const alpha = Math.pow(1 - age, 1.5);

            if (f1.lA && f1.rA) {
              if (pass === 1) drawOverlap(x0, x1, yMid, f1, alpha);
            } else if (f1.lA) {
              drawTraceSeg(
                x0,
                x1,
                yMid,
                f0.lA ? f0.lV : 0,
                f1.lV,
                f1.lP,
                f1.lTr,
                alpha,
                -1,
                pass,
              );
            } else if (f1.rA) {
              drawTraceSeg(
                x0,
                x1,
                yMid,
                f0.rA ? f0.rV : 0,
                f1.rV,
                f1.rP,
                f1.rTr,
                alpha,
                +1,
                pass,
              );
            }
          }
        }
      }

      function drawTraceSeg(
        x0,
        x1,
        yMid,
        vPrev,
        vCurr,
        pitch,
        tremor,
        alpha,
        dir,
        pass,
      ) {
        const ampPrev = vPrev * AMPLITUDE * dir;
        const ampCurr = vCurr * AMPLITUDE * dir;

        const wobbleFreq = 5 + pitch * 22;
        const wobbleAmp = vCurr * 7 * (0.3 + pitch * 0.7);
        const wobble = Math.sin(x1 * 0.07 * wobbleFreq) * wobbleAmp * dir;

        const noiseAmp = tremor * 7;
        const noise = (Math.random() - 0.5) * noiseAmp * dir;

        const y0 = yMid + ampPrev;
        const y1 = yMid + ampCurr + wobble + noise;

        if (pass === 0) {
          ctx.strokeStyle = `rgba(20,15,12,${alpha * 0.16})`;
          ctx.lineWidth = 5 + vCurr * 11;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x1, y1);
          ctx.stroke();

          ctx.strokeStyle = `rgba(20,15,12,${alpha * 0.08})`;
          ctx.lineWidth = 10 + vCurr * 18;
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x1, y1);
          ctx.stroke();
        } else {
          ctx.strokeStyle = `rgba(15,10,8,${alpha * (0.55 + vCurr * 0.45)})`;
          ctx.lineWidth = 1 + vCurr * 3.5;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x1, y1);
          ctx.stroke();
        }
      }

      function drawOverlap(x0, x1, yMid, f, alpha) {
        const w = Math.max(x1 - x0, 1);
        const upH = f.lV * AMPLITUDE * 1.15;
        const dnH = f.rV * AMPLITUDE * 1.15;
        const trMax = Math.max(f.lTr, f.rTr, 0.2);

        ctx.fillStyle = `rgba(15,10,8,${alpha * 0.14})`;
        ctx.beginPath();
        ctx.ellipse(
          (x0 + x1) / 2,
          yMid + (dnH - upH) / 2,
          w * 1.6 + 8,
          (upH + dnH) * 0.7 + 14,
          0,
          0,
          Math.PI * 2,
        );
        ctx.fill();

        ctx.fillStyle = `rgba(15,10,8,${alpha * 0.22})`;
        ctx.beginPath();
        ctx.ellipse(
          (x0 + x1) / 2,
          yMid + (dnH - upH) / 2,
          w * 1.2 + 4,
          (upH + dnH) * 0.6 + 6,
          0,
          0,
          Math.PI * 2,
        );
        ctx.fill();

        ctx.fillStyle = `rgba(8,6,5,${alpha * 0.88})`;
        ctx.beginPath();
        const N = 5;
        for (let i = 0; i <= N; i++) {
          const t = i / N;
          const x = x0 + t * w;
          const n = (Math.random() - 0.5) * trMax * 16;
          const y = yMid - upH - 2 + n;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        for (let i = N; i >= 0; i--) {
          const t = i / N;
          const x = x0 + t * w;
          const n = (Math.random() - 0.5) * trMax * 16;
          const y = yMid + dnH + 2 + n;
          ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
      }

      // ═══════════════════════════════════════════════════════════
      //  STATE LABEL
      // ═══════════════════════════════════════════════════════════
      let labelLastUpdate = 0;
      function updateLabel() {
        const now = performance.now();
        if (now - labelLastUpdate < 200) return;
        labelLastUpdate = now;

        if (!isConnected) {
          stateEl.textContent = "独 · ALONE";
          return;
        }
        if (local.active && remote.active)
          stateEl.textContent = "同 覆 · OVERLAP";
        else if (local.active) stateEl.textContent = "言 · SPEAK";
        else if (remote.active) stateEl.textContent = "听 · LISTEN";
        else stateEl.textContent = "静 · STILL";
      }

      // ═══════════════════════════════════════════════════════════
      //  MAIN LOOP
      // ═══════════════════════════════════════════════════════════
      function loop() {
        processAudio();
        sampleFrame();
        render();
        updateLabel();
        requestAnimationFrame(loop);
      }

      let loopStarted = false;

      async function startSession() {
        overlay.classList.add("hidden");
        markerSelf.classList.remove("hidden");
        markerOther.classList.remove("hidden");

        if (!analyser) {
          await initMic();
        }
        if (!loopStarted) {
          loopStarted = true;
          loop();
        }
      }

      resize();
    </script>
  </body>
</html>
